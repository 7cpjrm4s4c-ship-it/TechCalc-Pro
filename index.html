<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#03070c">
  <meta name="description" content="TechCalc Pro - modulare HLSK Quick Tools für Sanitär, Heizung, Lüftung und Klimatechnik.">
  <title>TechCalc Pro</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./assets/icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/icons/icon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/icon-32.png">
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/modules.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header glass-surface">
      <div class="header-spacer" aria-hidden="true"></div>
      <a class="brand" href="#/heating-cooling" aria-label="TechCalc Pro Startseite">
        <img class="brand__icon" src="./assets/icons/icon-192.png" alt="">
        <span class="brand__text">
          <strong class="brand__title">TechCalc Pro</strong>
          <span class="brand__subtitle">HLSK Quick Tools</span>
        </span>
      </a>
      <button class="icon-button" id="settingsButton" type="button" aria-label="Menü öffnen" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </header>

    <nav class="module-nav" aria-label="Module">
      <div class="module-nav__track" id="primaryNav"></div>
      <div class="overflow-menu glass-surface" id="overflowMenu" hidden></div>
    </nav>

    <main class="app-main grid-12" id="app" tabindex="-1"></main>

    <aside class="settings-panel glass-surface" id="settingsPanel" hidden>
      <div class="settings-panel__head">
        <strong>Einstellungen</strong>
        <button class="mini-button" id="closeSettings" type="button">Schließen</button>
      </div>
      <section>
        <h3>PDF-Export</h3>
        <p>Projektdaten für technische Berechnungsprotokolle. Die Daten werden lokal im Browser gespeichert.</p>
        <div class="settings-form" id="projectPdfSettings">
          <label>Auftraggeber<input id="pdfClient" type="text" autocomplete="organization" placeholder="z. B. Muster GmbH"></label>
          <label>Projektbezeichnung<input id="pdfProject" type="text" placeholder="z. B. Neubau Bürogebäude Nord"></label>
          <label>Projektnummer<input id="pdfProjectNo" type="text" placeholder="z. B. 2025-041"></label>
          <label>Sachbearbeiter<input id="pdfEngineer" type="text" placeholder="z. B. Max Mustermann"></label>
          <label>Firmenlogo<input id="pdfLogo" type="file" accept="image/png,image/jpeg,image/svg+xml"></label>
          <div class="settings-actions">
            <button class="mini-button" id="clearPdfLogo" type="button">Logo entfernen</button>
            <button class="mini-button mini-button--primary" id="exportPdfButton" type="button">PDF exportieren</button>
          </div>
          <div id="pdfLogoPreview" class="logo-preview" aria-live="polite"></div>
        </div>
      </section>
      <section>
        <h3>Mobile Schnellzugriffe</h3>
        <p>Wähle bis zu vier Module für die mobile Navigation. Reihenfolge wird gespeichert.</p>
        <div id="quickAccessSettings" class="settings-list"></div>
      </section>
    </aside>
  </div>
  <script type="module" src="./js/core/app.js"></script>
</body>
</html>
